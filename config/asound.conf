pcm.dmixer {
    type dmix
    ipc_key 1024
    slave {
        pcm "hw:Device,0"
        rate 48000
    }
}

pcm.!default {
    type asym
    playback.pcm {
        type plug
        slave.pcm "dmixer"
    }
    capture.pcm {
        type plug
        slave.pcm {
            type hw
            card Device
            device 0
        }
    }
}

ctl.!default {
    type hw
    card Device
}
